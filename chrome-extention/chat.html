<div class="__resize_handle__" id="__chat_resize_handle__"></div>

<!-- Slide-out drawer overlay -->
<div id="__chat_drawer_overlay__"></div>

<!-- Slide-out drawer -->
<div id="__chat_drawer__">
    <div class="__drawer_header__">Menu</div>
    <button class="__drawer_item__" id="__chat_theme_btn__" title="Toggle theme">
        <span class="__theme_icon_dark__">☀️</span>
        <span class="__theme_icon_light__">🌙</span>
        <span class="__drawer_label__">Toggle Theme</span>
    </button>
    <button class="__drawer_item__" id="__chat_price_btn__" title="Track Price">
        <span>📈</span>
        <span class="__drawer_label__">Track Price</span>
    </button>
    <button class="__drawer_item__" id="__chat_gdocs_btn__" title="Summarize & Save to Google Docs">
        <span>📄</span>
        <span class="__drawer_label__">Save to Google Docs</span>
    </button>
    <button class="__drawer_item__" id="__chat_refresh_btn__" title="Re-read page">
        <span>↺</span>
        <span class="__drawer_label__">Re-read Page</span>
    </button>
    <button class="__drawer_item__" id="__chat_clear_btn__" title="Clear chat">
        <span>🗑</span>
        <span class="__drawer_label__">Clear Chat</span>
    </button>
</div>

<div class="__chat_header__" id="__chat_drag_handle__">
    <div class="__chat_header_left__">
        <button class="__chat_btn__ __hamburger_btn__" id="__chat_menu_btn__" title="Menu">
            <span class="__hamburger_bar__"></span>
            <span class="__hamburger_bar__"></span>
            <span class="__hamburger_bar__"></span>
        </button>
        <div class="__chat_logo__">🤖</div>
        <div>
            <div class="__chat_title__">Web Chat AI</div>
            <div class="__chat_status__">Page loaded</div>
        </div>
    </div>
    <div class="__chat_header_actions__">
        <button class="__chat_btn__" id="__chat_minimize_btn__" title="Minimize">－</button>
        <button class="__chat_btn__" id="__chat_close_btn__" title="Close">✕</button>
    </div>
</div>

<div class="__chat_context_bar__">
    📄 Reading: <span id="__chat_page_label__"></span>
</div>

<!-- YouTube bar: only shown on YouTube pages -->
<div id="__yt_bar__" style="display:none; padding:8px 14px; background:#181825;
     border-bottom:1px solid #313244; display:none; align-items:center; gap:8px; flex-shrink:0;">
    <span style="font-size:16px">📺</span>
    <span id="__yt_status__" style="font-size:11px; color:#6c7086; flex:1;">YouTube video detected</span>
    <button id="__yt_load_btn__" class="__chat_btn__"
        style="font-size:11px; padding:4px 10px; border:1px solid #45475a; border-radius:20px; color:#cdd6f4; white-space:nowrap;">
        Load Video
    </button>
</div>

<div class="__chat_messages__" id="__chat_messages__">
    <div class="__chat_empty__">
        <div>🧠</div>
        <div>I've read this page.<br />Ask me anything about it!</div>
    </div>
</div>

<div class="__chat_suggestions__" id="__chat_suggestions__">
    <!-- Populated dynamically by content.js -->
</div>

<div class="__chat_input_area__">
    <textarea id="__chat_input__" class="__chat_textarea__" placeholder="Ask about this page..." rows="1"></textarea>
    <button id="__chat_send_btn__" class="__send_btn__">➤</button>
</div>
